services:
  - type: web
    name: vidograb
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: API_PROVIDER
        value: ytdlp
      - key: YTDLP_PATH
        value: yt-dlp
      - key: NODE_ENV
        value: production
      - key: MAX_CONCURRENT_STREAMS
        value: "2"
      - key: NODE_OPTIONS
        value: --max-old-space-size=460
