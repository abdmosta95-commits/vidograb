services:
  - type: web
    name: vidograb
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: API_PROVIDER
        value: ytdlp
      - key: YTDLP_PATH
        value: yt-dlp
      - key: NODE_ENV
        value: production
